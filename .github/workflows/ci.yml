name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install torch CPU
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest api/tests/test_unit.py -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install torch CPU
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install all dependencies
        run: pip install -r requirements.txt

      - name: Start MLflow
        run: |
          mlflow server --host 0.0.0.0 --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlartifacts &
          sleep 10

      - name: Register models
        run: |
          export MLFLOW_TRACKING_URI=http://localhost:5000
          timeout 600 python scripts/register_models.py || echo "Some models may have failed"

      - name: Start API
        run: |
          cd api
          export MLFLOW_TRACKING_URI=http://localhost:5000
          export APP_DB_PATH=../app_detections.db
          export LOG_PATH=../logs/predictions.jsonl
          mkdir -p ../logs
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for API..."
          for i in $(seq 1 120); do
            curl -sf http://localhost:8000/health && break
            sleep 5
          done

      - name: Run integration tests
        run: pytest api/tests/test_integration.py -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/gastlinassim/waste-api:latest
            ghcr.io/gastlinassim/waste-api:${{ github.sha }}