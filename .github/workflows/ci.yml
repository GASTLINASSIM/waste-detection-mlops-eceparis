name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          # Torch CPU pour accélérer
          pip install torch==2.4.1+cpu torchvision==0.19.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run unit tests (sans MLflow — tests skippent les cas qui en dépendent)
        run: pytest api/tests/test_unit.py -v

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Start MLflow + API stack
        run: |
          docker compose up -d mlflow
          sleep 10
          # Enregistre les modèles (avec poids aléatoires)
          pip install mlflow==2.17.0 ultralytics==8.3.0 transformers==4.45.2 torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install mlflow==2.17.0
          export MLFLOW_TRACKING_URI=http://localhost:5000
          # Le script peut timeout — on le fait en arrière-plan
          timeout 600 python scripts/register_models.py || echo "Some models may have failed, continuing"
          docker compose up -d --build api
          for i in {1..60}; do
            curl -sf http://localhost:8000/health && break
            sleep 5
          done

      - name: Run integration test
        run: |
          pip install pytest requests
          pytest api/tests/test_integration.py -v

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  build-and-push:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/waste-api:latest
            ghcr.io/${{ github.repository_owner }}/waste-api:${{ github.sha }}