groups:
  - name: waste_detection_alerts
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="waste-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "L'API waste-api est injoignable"
          description: "Prometheus ne scrape plus /metrics depuis 30s"

      - alert: HighValidationErrorRate
        expr: |
          (rate(ml_validation_errors_total[5m]) /
           (rate(ml_predictions_total[5m]) + rate(ml_validation_errors_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreurs de validation > 5%"
          description: "Plus de 5% des requêtes échouent à la validation sur les 5 dernières minutes"

      - alert: HighInferenceLatency
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(ml_inference_latency_seconds_bucket[5m]))
          ) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence d'inférence p95 > 3s"
          description: "Le 95e percentile de latence dépasse 3s, vérifier la charge"