services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: waste-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      APP_DB_PATH: /data/app_detections.db
      LOG_PATH: /app/logs/predictions.jsonl
    volumes:
      - shared_data:/data
      - ./logs:/app/logs
    depends_on:
      - mlflow

volumes:
  mlflow_data:
  shared_data: